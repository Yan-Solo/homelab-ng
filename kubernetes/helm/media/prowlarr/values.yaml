app-template:
    defaultPodOptions:
        dnsConfig:
            nameservers:
                - 8.8.8.8
    controllers:
        main:
            containers:
                main:
                    image:
                        repository: lscr.io/linuxserver/prowlarr
                        tag: 2.3.5.5327-ls141
    service:
        main:
            controller: main
            ports:
                http:
                    port: 9696
                    targetPort: 9696
    route:
        main:
            enabled: true
            kind: HTTPRoute
            annotations:
                cert-manager.io/cluster-issuer: letsencrypt
            hostnames:
                - prowlarr.sunnyvale.be
            parentRefs:
                - name: envoy-gateway
                  namespace: default
                  sectionName: https
    persistence:
        config:
            enabled: true
            type: persistentVolumeClaim
            accessMode: ReadWriteOnce
            size: 1Gi
            storageClass: local-path-ssd
            globalMounts:
                - path: /config
