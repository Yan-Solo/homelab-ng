app-template:
  defaultPodOptions:
    enableServiceLinks: false
  controllers:
    main:
      containers:
        main:
          image:
            repository: ghcr.io/maxdorninger/mediamanager
            tag: latest
            pullPolicy: IfNotPresent
          env:
            TZ: Europe/Brussels
            CORS_URLS: "http://mediamanager"
  
  service:
    main:
      controller: main
      annotations:
        tailscale.com/expose: "true"
        tailscale.com/hostname: "mediamanager"
      ports:
        http:
          port: 8080
          targetPort: 8080