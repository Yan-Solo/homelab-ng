gateway-crds-helm:
  crds:
    gatewayAPI:
      enabled: true
      channel: standard
    envoyGateway:
      enabled: true

gateway-helm:
  config:
    envoyGateway:
      gateway:
        controllerName: gateway.envoyproxy.io/gatewayclass-controller
      logging:
        level:
          default: info
      provider:
        type: Kubernetes

  # Deploy the GatewayClass resource
  createNamespace: false

  deployment:
    envoyGateway:
      replicas: 1

  # Service configuration for the Envoy Gateway
  service:
    type: LoadBalancer
    annotations: {}

  # Security context
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
