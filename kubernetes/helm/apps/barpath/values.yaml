    #         matches:
    #           - path:
    #               type: pathPrefix
    #               value: /api

  persistence:
    postgres-data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 1Gi
      storageClass: local-path-ssd
      globalMounts:
        - path: /opt/psqldata
